<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>The Topo Bouldergebietsuche</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.js"></script>

<link href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="map"></div>

<div id="list-view" class="hidden">
  <div id="list-items"></div>
</div>

<div id="panel">
  <button id="panel-toggle" aria-label="Filter ein-/ausklappen">
    <span id="panel-title">The Topo Bouldergebietsuche</span>
    <span id="panel-arrow">&#9650;</span>
  </button>

  <div id="panel-body">
    <div id="stats">lade Daten&hellip;</div>

    <div id="toolbar-row">
      <div id="view-toggle" role="tablist">
        <button type="button" class="view-toggle-btn active" data-view="map">Karte</button>
        <button type="button" class="view-toggle-btn" data-view="list">Liste</button>
      </div>
      <button type="button" id="share-view-btn" aria-label="Ansicht teilen">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
      </button>
    </div>

    <label class="panel-label">Schwierigkeitsgrad (Font)</label>
    <div id="grade-range-labels">
      <span id="grade-min-label"></span>
      <span id="grade-max-label"></span>
    </div>
    <div id="grade-slider"></div>
  </div>
</div>

<div id="loading-error" class="hidden"></div>

<script src="app.js"></script>
</body>
</html>
